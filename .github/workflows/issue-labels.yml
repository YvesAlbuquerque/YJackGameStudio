name: Apply Issue Labels From Form Body

on:
  issues:
    types: [opened, edited]

jobs:
  apply-labels:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Apply labels from structured form fields
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const currentLabels = context.payload.issue.labels.map(l => l.name);
            const currentLabelsLower = new Set(currentLabels.map(l => l.toLowerCase()));

            // Label prefixes extracted from form dropdown values.
            // Options are written as "prefix:value — description" or "prefix:value".
            const PREFIXES = [
              'priority:',
              'auto:',
              'effort:',
              'phase:',
              'domain:',
              'status:',
              'risk:',
            ];

            // Groups that are mutually exclusive — only one label per group should be present.
            const EXCLUSIVE_GROUPS = {
              'priority:': /^priority:/,
              'auto:':     /^auto:/,
              'effort:':   /^effort:/,
              'phase:':    /^phase:/,
              'domain:':   /^domain:/,
              'status:':   /^status:/,
            };

            const labelsToAdd = [];

            for (const line of body.split('\n')) {
              const trimmed = line.trim();
              const inlineMatch = trimmed.match(/(priority|auto|effort|phase|domain|status|risk):[a-z0-9-]+/i);
              if (inlineMatch) {
                const label = inlineMatch[0].toLowerCase();
                if (!currentLabelsLower.has(label)) {
                  labelsToAdd.push(label);
                }
              }
              for (const prefix of PREFIXES) {
                if (trimmed.startsWith(prefix)) {
                  // Extract label: take text up to first ' —' (em dash) or first space
                  const label = trimmed.split(' \u2014')[0].split(' \u2013')[0].trim();
                  const normalized = label.toLowerCase();
                  if (label && !currentLabelsLower.has(normalized)) {
                    labelsToAdd.push(normalized);
                  }
                  break;
                }
              }
            }

            if (labelsToAdd.length === 0) {
              console.log('No new labels to apply.');
              return;
            }

            // Collect labels to remove (stale labels in the same exclusive group as a new label)
            const labelsToRemove = [];
            for (const newLabel of labelsToAdd) {
              for (const [prefix, pattern] of Object.entries(EXCLUSIVE_GROUPS)) {
                if (newLabel.startsWith(prefix)) {
                  for (const existing of currentLabels) {
                    if (pattern.test(existing) && existing !== newLabel && !labelsToRemove.includes(existing)) {
                      labelsToRemove.push(existing);
                    }
                  }
                }
              }
            }

            // Remove stale exclusive labels first
            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label,
                });
                console.log('Removed stale label:', label);
              } catch (err) {
                console.log('Could not remove label (may not exist):', label, err.message);
              }
            }

            // Add new labels (GitHub silently ignores labels that don't exist in the repo,
            // so run `github-label-sync` or the bootstrap script first — see .github/LABELS.md)
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToAdd,
            });
            console.log('Applied labels:', labelsToAdd);
