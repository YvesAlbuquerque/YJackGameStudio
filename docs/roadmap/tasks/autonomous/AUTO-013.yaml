id: "AUTO-013"
type: autonomous
title: "Owner Dashboard and Autonomous Status Report"
subsystem: reporting
priority: P2
effort: M
status: PROPOSED
github_issue: null
labels:
  - autonomous
  - roadmap
  - reporting
dependencies:
  - "AUTO-005"
  - "AUTO-012"
description: >
  Provide the owner with a concise, always-current view of autonomous studio
  activity. Define a dashboard artifact (production/dashboard.md or equivalent)
  summarizing: active contracts, pending owner decisions, completed work since
  last review, next scheduled actions, and open risk items. The dashboard is
  regenerated by agents after each significant state change. Provide a
  /studio-status skill (or extend /sprint-status) that produces the dashboard
  on demand. Define what "significant state change" means in terms of the
  contract lifecycle (AUTO-005). Dashboard summary must be readable at a glance
  without scrolling.
acceptance_criteria:
  - "Dashboard schema defined and documented"
  - "/studio-status skill (or /sprint-status extension) produces the dashboard"
  - "Dashboard is regenerated after significant contract lifecycle state changes"
  - "Summary section is readable at a glance without scrolling"
  - "Owner decisions are visually distinct from agent status items"
artifacts:
  - "production/dashboard.md (schema)"
  - ".agents/skills/studio-status/SKILL.md (new) or updated sprint-status"
notes: >
  Dashboard must be readable at a glance — no scrolling for the summary.
  Owner decisions must be clearly distinguished from agent status items.
